name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: npm version patch --no-git-tag-version

      - name: Get version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate feature docs
        uses: devcontainers/action@v1
        with:
          generate-docs: "true"
          base-path-to-features: "./src"

      - name: Update feature versions
        run: |
          find ./src -name devcontainer-feature.json -print0 | while IFS= read -r -d '' FILE; do
            tmpfile=$(mktemp)
            jq ".version = \"$VERSION\"" "$FILE" > "$tmpfile"
            mv "$tmpfile" "$FILE"
          done
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}

      - name: Commit version bump
        run: |
          git add package.json package-lock.json $(find ./src -name devcontainer-feature.json)
          git diff --cached --quiet || git commit -m "chore(release): v$VERSION"
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}

      - name: Push to main
        run: git push origin main

      - name: Tag release
        run: |
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
