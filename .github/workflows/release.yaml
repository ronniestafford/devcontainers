name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version without git commit
        run: |
          npm version patch --no-git-tag-version
          git add package.json package-lock.json

      - name: Get repo version
        id: get_repo_version
        run: |
          REPO_NEW_VERSION=$(node -p "require('./package.json').version")
          echo "REPO_NEW_VERSION=$REPO_NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Generate feature docs
        uses: devcontainers/action@v1
        with:
          generate-docs: "true"
          base-path-to-features: "./src"

      - name: Detect which features have changes
        id: features
        run: |
          FEATURES=$(git diff --name-only $PREV_COMMIT_SHA $TRIGGERING_COMMIT_SHA src \
            | awk -F/ 'NF>2 {print $2}' \
            | sort -u \
            | while read f; do
                [ -f "src/$f/devcontainer-feature.json" ] && echo "$f"
              done)

          if [ -n "$FEATURES" ]; then
            echo "Changed features:"
            echo "$FEATURES"
          else
            echo "No features changed."
          fi

          {
            echo "features<<EOF"
            echo "$FEATURES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          PREV_COMMIT_SHA: ${{ github.event.before }}
          TRIGGERING_COMMIT_SHA: ${{github.sha}}

      - name: Update feature versions
        run: |
          if [ -n "$FEATURES" ]; then
            echo "Updating versions for changed features:"
            echo "$FEATURES"
            for feature in $FEATURES; do
              FEATURE_FILE="./src/$feature/devcontainer-feature.json"
              if [ -f "$FEATURE_FILE" ]; then
                CURRENT_VERSION=$(jq -r '.version' "$FEATURE_FILE")
                IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
                PATCH=$((PATCH + 1))
                NEW_VERSION="$MAJOR.$MINOR.$PATCH"
                
                tmpfile=$(mktemp)
                jq --arg version "$NEW_VERSION" '.version = $version' "$FEATURE_FILE" > "$tmpfile"
                mv "$tmpfile" "$FEATURE_FILE"
                git add "$FEATURE_FILE"
                echo "Updated version in $FEATURE_FILE and added to staging commit."
              fi
            done
          else
            echo "No features changed, skipping version updates."
          fi
        env:
          FEATURES: ${{ steps.features.outputs.features }}

      - name: Commit documentation changes and version bumps (repo and feature versions are independent)
        run: |
          git diff --cached --quiet || git commit -m "chore(release): v$REPO_NEW_VERSION [skip ci]"
        env:
          REPO_NEW_VERSION: ${{ steps.get_repo_version.outputs.REPO_NEW_VERSION }}

      - name: Push to main
        run: git push origin main

      - name: Tag release
        run: |
          git tag -a "v$REPO_NEW_VERSION" -m "Release v$REPO_NEW_VERSION"
          git push origin "v$REPO_NEW_VERSION"
        env:
          REPO_NEW_VERSION: ${{ steps.get_repo_version.outputs.REPO_NEW_VERSION }}
