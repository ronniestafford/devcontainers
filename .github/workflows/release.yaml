name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version-file: ".nvmrc"

      - name: Configure Git
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com

      - name: Bump version
        run: npm version patch --no-git-tag-version

      - name: Get version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate feature docs
        uses: devcontainers/action@v1
        with:
          generate-docs: "true"
          base-path-to-features: "./src"

      - name: Update feature versions
        run: |
          find ./src -name devcontainer-feature.json -print0 | while IFS= read -r -d '' FILE; do
            jq ".version = \"$VERSION\"" "$FILE" > tmp.$$.json
            mv tmp.$$.json "$FILE"
          done
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}

      - name: Commit release changes
        run: |
          git add package.json package-lock.json $(find ./src -name devcontainer-feature.json)
          git commit -m "chore(release): v$VERSION"
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}

      - name: Create Release PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(release): v$VERSION"
          branch: "release-v$VERSION"
          title: "Release v$VERSION"
          body: "Automated release PR for v$VERSION"
          labels: "release"
          draft: false
          base: main
          delete-branch: true
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}

      - name: Push tag if on main
        if: github.ref == 'refs/heads/main'
        run: |
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
